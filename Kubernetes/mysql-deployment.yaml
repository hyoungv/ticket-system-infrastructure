apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: ticket-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:5.7
          command:
            - bash
            - -c
            - ulimit -n 65536 && exec docker-entrypoint.sh mysqld
          args:
            - --innodb-buffer-pool-size=32M
            - --key-buffer-size=8M
            - --max-connections=20
            - --table-open-cache=64
            - --performance-schema=OFF
          ports:
            - containerPort: 3306
          envFrom:
            - secretRef:
                name: mysql-secret
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc
